<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Famous Shayars</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600&family=Noto+Sans:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="top">
        <h1 class="title">Famous Shayars</h1>
        <p class="subtitle">
          Greatest Of All Times.
        </p>

        <nav class="top-nav" aria-label="Primary navigation">
          <a class="nav-link" href="./index.html">Back to Shayari</a>
        </nav>
      </header>

      <main class="people">
        <div class="gallery-grid" aria-label="Famous shayars grid">
          <figure class="person-card">
            <!-- Replace src with your image path or URL -->
            <img
              class="person-img"
              src="./Mirza-Galib.webp"
              alt="Mirza Galib"
            />
            <figcaption class="person-name">Mirza Galib</figcaption>
          </figure>

          <figure class="person-card">
            <img
              class="person-img"
              src="./Mir.jpg"
              alt="Mir Taqi Mir"
            />
            <figcaption class="person-name">Mir Taqi Mir</figcaption>
          </figure>

          <figure class="person-card">
            <img
              class="person-img"
              src="./mohammd iqbal.jpg"
              alt="Allama Iqbal"
            />
            <figcaption class="person-name">Allama Iqbal</figcaption>
          </figure>

          <figure class="person-card">
            <img
              class="person-img"
              src="./faiz ahmad.jpg"
              alt="Faiz Ahmad Faiz "
            />
            <figcaption class="person-name">Faiz Ahmad Faiz </figcaption>
          </figure>

          <figure class="person-card">
            <img
              class="person-img"
              src="./jaun.jpg"
              alt="Jaun Elia"
            />
            <figcaption class="person-name">Jaun Elia</figcaption>
          </figure>

          <figure class="person-card">
            <img
              class="person-img"
              src="./writer.gif"
              alt="Rahat Indori"
            />
            <figcaption class="person-name">How they feel while writing</figcaption>
          </figure>
        </div>
      </main>

      <footer class="footer">
        <span>Tip: Use local image paths if you have them.</span>
      </footer>
    </div>

    <!-- Service worker registration (offline + faster repeat loads) -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
